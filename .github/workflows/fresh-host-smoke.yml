name: Fresh Host Smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4.0.4
        with:
          node-version: "22"
      - name: Install OpenCode
        run: npm install -g opencode-ai
      - name: Bootstrap (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./scripts/bootstrap.sh --skip-installs --yes --opencode-go no
      - name: Smoke test (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./scripts/smoke-test.sh
      - name: Bootstrap (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\bootstrap.ps1 --skip-installs --yes --opencode-go no
      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\smoke-test.ps1
